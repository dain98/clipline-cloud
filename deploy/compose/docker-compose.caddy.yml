name: clipline-cloud-caddy

services:
  clipline-cloud:
    image: ${CLIPLINE_IMAGE:-ghcr.io/dain98/clipline-cloud:latest}
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      CLIPLINE_PUBLIC_URL: https://${CLIPLINE_DOMAIN:-clips.example.com}
      CLIPLINE_PROCESS_ROLE: ${CLIPLINE_WEB_PROCESS_ROLE:-all}
      CLIPLINE_DATABASE_URL: sqlite:///data/clipline.db
      CLIPLINE_STORAGE_BACKEND: local
      CLIPLINE_DATA_DIR: /data
      CLIPLINE_BOOTSTRAP_ADMIN_USERNAME: ${CLIPLINE_BOOTSTRAP_ADMIN_USERNAME:-admin}
      CLIPLINE_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      CLIPLINE_SESSION_SECRET_FILE: /run/secrets/session_secret
      CLIPLINE_TRUSTED_PROXY_HOPS: ${CLIPLINE_CADDY_IP:-172.30.0.2}
      CLIPLINE_MAX_UPLOAD_SIZE_BYTES: ${CLIPLINE_MAX_UPLOAD_SIZE_BYTES:-5368709120}
      CLIPLINE_UPLOAD_PART_SIZE_BYTES: ${CLIPLINE_UPLOAD_PART_SIZE_BYTES:-8388608}
      CLIPLINE_SINGLE_PUT_MAX_BYTES: ${CLIPLINE_SINGLE_PUT_MAX_BYTES:-67108864}
      CLIPLINE_UPLOAD_SESSION_TTL_SECONDS: ${CLIPLINE_UPLOAD_SESSION_TTL_SECONDS:-86400}
      CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER: ${CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER:-16}
      # 0 disables quota/warning checks; it does not block uploads.
      CLIPLINE_USER_STORAGE_QUOTA_BYTES: ${CLIPLINE_USER_STORAGE_QUOTA_BYTES:-0}
      CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES: ${CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES:-0}
      CLIPLINE_PUBLIC_MEDIA_MODE: ${CLIPLINE_PUBLIC_MEDIA_MODE:-presigned}
      CLIPLINE_PUBLIC_READ_URL_TTL_SECONDS: ${CLIPLINE_PUBLIC_READ_URL_TTL_SECONDS:-300}
      CLIPLINE_LOG_LEVEL: ${CLIPLINE_LOG_LEVEL:-info}
    volumes:
      - clipline_data:/data
    secrets:
      - admin_password
      - session_secret
    networks:
      clipline:
        ipv4_address: ${CLIPLINE_APP_IP:-172.30.0.10}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  clipline-worker:
    profiles: ["worker"]
    image: ${CLIPLINE_IMAGE:-ghcr.io/dain98/clipline-cloud:latest}
    restart: unless-stopped
    depends_on:
      clipline-cloud:
        condition: service_healthy
    environment:
      CLIPLINE_PUBLIC_URL: https://${CLIPLINE_DOMAIN:-clips.example.com}
      CLIPLINE_PROCESS_ROLE: worker
      CLIPLINE_DATABASE_URL: sqlite:///data/clipline.db
      CLIPLINE_STORAGE_BACKEND: local
      CLIPLINE_DATA_DIR: /data
      CLIPLINE_BOOTSTRAP_ADMIN_USERNAME: ${CLIPLINE_BOOTSTRAP_ADMIN_USERNAME:-admin}
      CLIPLINE_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      CLIPLINE_SESSION_SECRET_FILE: /run/secrets/session_secret
      CLIPLINE_TRUSTED_PROXY_HOPS: ${CLIPLINE_CADDY_IP:-172.30.0.2}
      CLIPLINE_MAX_UPLOAD_SIZE_BYTES: ${CLIPLINE_MAX_UPLOAD_SIZE_BYTES:-5368709120}
      CLIPLINE_UPLOAD_PART_SIZE_BYTES: ${CLIPLINE_UPLOAD_PART_SIZE_BYTES:-8388608}
      CLIPLINE_SINGLE_PUT_MAX_BYTES: ${CLIPLINE_SINGLE_PUT_MAX_BYTES:-67108864}
      CLIPLINE_UPLOAD_SESSION_TTL_SECONDS: ${CLIPLINE_UPLOAD_SESSION_TTL_SECONDS:-86400}
      CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER: ${CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER:-16}
      CLIPLINE_USER_STORAGE_QUOTA_BYTES: ${CLIPLINE_USER_STORAGE_QUOTA_BYTES:-0}
      CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES: ${CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES:-0}
      CLIPLINE_PUBLIC_MEDIA_MODE: ${CLIPLINE_PUBLIC_MEDIA_MODE:-presigned}
      CLIPLINE_PUBLIC_READ_URL_TTL_SECONDS: ${CLIPLINE_PUBLIC_READ_URL_TTL_SECONDS:-300}
      CLIPLINE_LOG_LEVEL: ${CLIPLINE_LOG_LEVEL:-info}
    volumes:
      - clipline_data:/data
    secrets:
      - admin_password
      - session_secret

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      clipline-cloud:
        condition: service_healthy
    environment:
      CLIPLINE_DOMAIN: ${CLIPLINE_DOMAIN:-clips.example.com}
      CLIPLINE_ACME_EMAIL: ${CLIPLINE_ACME_EMAIL:-admin@example.com}
    ports:
      - "${CLIPLINE_CADDY_HTTP_PORT:-80}:80"
      - "${CLIPLINE_CADDY_HTTPS_PORT:-443}:443"
      - "${CLIPLINE_CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      clipline:
        ipv4_address: ${CLIPLINE_CADDY_IP:-172.30.0.2}

secrets:
  admin_password:
    file: ${CLIPLINE_COMPOSE_ADMIN_PASSWORD_FILE:-./secrets/admin_password.txt}
  session_secret:
    file: ${CLIPLINE_COMPOSE_SESSION_SECRET_FILE:-./secrets/session_secret.txt}

volumes:
  clipline_data:
  caddy_data:
  caddy_config:

networks:
  clipline:
    ipam:
      config:
        - subnet: ${CLIPLINE_CADDY_SUBNET:-172.30.0.0/24}
