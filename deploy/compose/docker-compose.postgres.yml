name: clipline-cloud-postgres

services:
  clipline-cloud:
    image: ${CLIPLINE_IMAGE:-ghcr.io/dain98/clipline-cloud:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${CLIPLINE_HTTP_PORT:-8080}:8080"
    environment:
      CLIPLINE_PUBLIC_URL: ${CLIPLINE_PUBLIC_URL:-http://localhost:8080}
      CLIPLINE_PROCESS_ROLE: ${CLIPLINE_WEB_PROCESS_ROLE:-all}
      CLIPLINE_DATABASE_URL_FILE: /run/secrets/database_url
      CLIPLINE_STORAGE_BACKEND: local
      CLIPLINE_DATA_DIR: /data
      CLIPLINE_BOOTSTRAP_ADMIN_USERNAME: ${CLIPLINE_BOOTSTRAP_ADMIN_USERNAME:-admin}
      CLIPLINE_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      CLIPLINE_SESSION_SECRET_FILE: /run/secrets/session_secret
      CLIPLINE_MAX_UPLOAD_SIZE_BYTES: ${CLIPLINE_MAX_UPLOAD_SIZE_BYTES:-5368709120}
      CLIPLINE_UPLOAD_PART_SIZE_BYTES: ${CLIPLINE_UPLOAD_PART_SIZE_BYTES:-8388608}
      CLIPLINE_SINGLE_PUT_MAX_BYTES: ${CLIPLINE_SINGLE_PUT_MAX_BYTES:-67108864}
      CLIPLINE_UPLOAD_SESSION_TTL_SECONDS: ${CLIPLINE_UPLOAD_SESSION_TTL_SECONDS:-86400}
      CLIPLINE_VIDEO_OPTIMIZATION: ${CLIPLINE_VIDEO_OPTIMIZATION:-off}
      CLIPLINE_VIDEO_OPTIMIZATION_CRF: ${CLIPLINE_VIDEO_OPTIMIZATION_CRF:-26}
      CLIPLINE_VIDEO_OPTIMIZATION_PRESET: ${CLIPLINE_VIDEO_OPTIMIZATION_PRESET:-veryfast}
      CLIPLINE_VIDEO_OPTIMIZATION_MAX_WIDTH: ${CLIPLINE_VIDEO_OPTIMIZATION_MAX_WIDTH:-0}
      CLIPLINE_VIDEO_OPTIMIZATION_MIN_SAVINGS_PERCENT: ${CLIPLINE_VIDEO_OPTIMIZATION_MIN_SAVINGS_PERCENT:-5}
      CLIPLINE_VIDEO_OPTIMIZATION_KEEP_ORIGINAL: ${CLIPLINE_VIDEO_OPTIMIZATION_KEEP_ORIGINAL:-false}
      CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER: ${CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER:-16}
      CLIPLINE_USER_STORAGE_QUOTA_BYTES: ${CLIPLINE_USER_STORAGE_QUOTA_BYTES:-0}
      CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES: ${CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES:-0}
      CLIPLINE_LOG_LEVEL: ${CLIPLINE_LOG_LEVEL:-info}
    volumes:
      - clipline_data:/data
    secrets:
      - database_url
      - admin_password
      - session_secret
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  clipline-worker:
    profiles: ["worker"]
    image: ${CLIPLINE_IMAGE:-ghcr.io/dain98/clipline-cloud:latest}
    restart: unless-stopped
    depends_on:
      clipline-cloud:
        condition: service_healthy
    environment:
      CLIPLINE_PUBLIC_URL: ${CLIPLINE_PUBLIC_URL:-http://localhost:8080}
      CLIPLINE_PROCESS_ROLE: worker
      CLIPLINE_DATABASE_URL_FILE: /run/secrets/database_url
      CLIPLINE_STORAGE_BACKEND: local
      CLIPLINE_DATA_DIR: /data
      CLIPLINE_BOOTSTRAP_ADMIN_USERNAME: ${CLIPLINE_BOOTSTRAP_ADMIN_USERNAME:-admin}
      CLIPLINE_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      CLIPLINE_SESSION_SECRET_FILE: /run/secrets/session_secret
      CLIPLINE_MAX_UPLOAD_SIZE_BYTES: ${CLIPLINE_MAX_UPLOAD_SIZE_BYTES:-5368709120}
      CLIPLINE_UPLOAD_PART_SIZE_BYTES: ${CLIPLINE_UPLOAD_PART_SIZE_BYTES:-8388608}
      CLIPLINE_SINGLE_PUT_MAX_BYTES: ${CLIPLINE_SINGLE_PUT_MAX_BYTES:-67108864}
      CLIPLINE_UPLOAD_SESSION_TTL_SECONDS: ${CLIPLINE_UPLOAD_SESSION_TTL_SECONDS:-86400}
      CLIPLINE_VIDEO_OPTIMIZATION: ${CLIPLINE_VIDEO_OPTIMIZATION:-off}
      CLIPLINE_VIDEO_OPTIMIZATION_CRF: ${CLIPLINE_VIDEO_OPTIMIZATION_CRF:-26}
      CLIPLINE_VIDEO_OPTIMIZATION_PRESET: ${CLIPLINE_VIDEO_OPTIMIZATION_PRESET:-veryfast}
      CLIPLINE_VIDEO_OPTIMIZATION_MAX_WIDTH: ${CLIPLINE_VIDEO_OPTIMIZATION_MAX_WIDTH:-0}
      CLIPLINE_VIDEO_OPTIMIZATION_MIN_SAVINGS_PERCENT: ${CLIPLINE_VIDEO_OPTIMIZATION_MIN_SAVINGS_PERCENT:-5}
      CLIPLINE_VIDEO_OPTIMIZATION_KEEP_ORIGINAL: ${CLIPLINE_VIDEO_OPTIMIZATION_KEEP_ORIGINAL:-false}
      CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER: ${CLIPLINE_MAX_ACTIVE_UPLOAD_SESSIONS_PER_USER:-16}
      CLIPLINE_USER_STORAGE_QUOTA_BYTES: ${CLIPLINE_USER_STORAGE_QUOTA_BYTES:-0}
      CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES: ${CLIPLINE_GLOBAL_STORAGE_WARNING_THRESHOLD_BYTES:-0}
      CLIPLINE_LOG_LEVEL: ${CLIPLINE_LOG_LEVEL:-info}
    volumes:
      - clipline_data:/data
    secrets:
      - database_url
      - admin_password
      - session_secret

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: clipline
      POSTGRES_USER: clipline
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipline -d clipline"]
      interval: 10s
      timeout: 5s
      retries: 10

secrets:
  database_url:
    file: ${CLIPLINE_COMPOSE_DATABASE_URL_FILE:-./secrets/database_url.txt}
  postgres_password:
    file: ${CLIPLINE_COMPOSE_POSTGRES_PASSWORD_FILE:-./secrets/postgres_password.txt}
  admin_password:
    file: ${CLIPLINE_COMPOSE_ADMIN_PASSWORD_FILE:-./secrets/admin_password.txt}
  session_secret:
    file: ${CLIPLINE_COMPOSE_SESSION_SECRET_FILE:-./secrets/session_secret.txt}

volumes:
  clipline_data:
  postgres_data:
