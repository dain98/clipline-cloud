name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install web deps
        run: npm ci --prefix apps/clipline-cloud-web
      - name: Check committed dist
        run: npm run check:dist --prefix apps/clipline-cloud-web

  compose-config:
    name: Compose Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Compose profiles
        run: CONFIG_ONLY=1 BUILD_IMAGE=0 deploy/compose/smoke.sh

  database-backends:
    name: Database Backends
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clipline
          POSTGRES_PASSWORD: clipline
          POSTGRES_DB: clipline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clipline -d clipline_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CLIPLINE_TEST_POSTGRES_URL: postgres://clipline:clipline@localhost:5432/clipline_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test SQLite and Postgres repositories
        run: cargo test -p clipline-cloud-db
