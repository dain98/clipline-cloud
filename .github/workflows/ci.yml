name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install web deps
        run: npm ci --prefix apps/clipline-cloud-web
      - name: Run web tests
        run: npm test --prefix apps/clipline-cloud-web
      - name: Audit web dependencies
        run: npm audit --prefix apps/clipline-cloud-web --audit-level=high
      - name: Check committed dist
        run: npm run check:dist --prefix apps/clipline-cloud-web

  compose-config:
    name: Compose Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Compose profiles
        run: CONFIG_ONLY=1 BUILD_IMAGE=0 deploy/compose/smoke.sh
      - name: Verify standalone image matches the server version
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' apps/clipline-cloud-server/Cargo.toml | head -n 1)"
          test -n "$version"
          grep -F "ghcr.io/dain98/clipline-cloud:$version" deploy/compose/docker-compose.standalone.yml
          grep -F "ghcr.io/dain98/clipline-cloud:$version" deploy/compose/standalone.env.example

  compose-runtime:
    name: Compose Runtime Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Exercise local, MinIO, and Postgres profiles
        run: RUN_PROFILES="default minio postgres" deploy/compose/smoke.sh

  s3-storage:
    name: S3 Storage Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Start MinIO
        run: |
          docker run -d --name clipline-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=clipline \
            -e MINIO_ROOT_PASSWORD=clipline-secret \
            minio/minio server /data
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:9000/minio/health/ready && break
            if [ "$attempt" = 30 ]; then docker logs clipline-minio; exit 1; fi
            sleep 2
          done
      - name: Create test bucket
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc \
            -c 'mc alias set local http://127.0.0.1:9000 clipline clipline-secret && mc mb local/clipline-test'
      - name: Run S3 round-trip test
        env:
          CLIPLINE_TEST_S3_ENDPOINT: http://127.0.0.1:9000
          CLIPLINE_TEST_S3_BUCKET: clipline-test
          CLIPLINE_TEST_S3_ACCESS_KEY_ID: clipline
          CLIPLINE_TEST_S3_SECRET_ACCESS_KEY: clipline-secret
        run: cargo test -p clipline-cloud-storage s3_round_trip_against_minio -- --ignored

  database-backends:
    name: Database Backends
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clipline
          POSTGRES_PASSWORD: clipline
          POSTGRES_DB: clipline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clipline -d clipline_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CLIPLINE_TEST_POSTGRES_URL: postgres://clipline:clipline@localhost:5432/clipline_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test SQLite and Postgres repositories
        run: cargo test -p clipline-cloud-db
